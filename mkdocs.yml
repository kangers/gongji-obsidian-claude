site_name: 公基知识库
site_description: 公共基础知识备考 Wiki — Obsidian + Claude 构建的第二大脑
site_url: https://kangers.github.io/gongji-obsidian-claude
repo_url: https://github.com/kangers/gongji-obsidian-claude
repo_name: 公基知识库
edit_uri: edit/main/docs/content/

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 浅色模式
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.caret
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - 首页: index.md
  - 知识库总览: wiki/content/wiki/总览.md
  - 内容目录: wiki/content/wiki/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kangers/gongji-obsidian-claude
  generator: false

copyright: CC BY-SA 4.0 — 公基知识库
